# Single-origin reverse proxy with TLS.
# Browser hits this on 443 (HTTPS). Frontend and backend live on the docker network
# behind it. /api/* gets stripped and forwarded to backend, everything else to frontend.
# Port 80 stays open only for HTTP->HTTPS redirect and Let's Encrypt ACME challenges.

# Social-media crawlers can't run JS, so they'd only see the SPA's static index.html
# with no per-product preview. For product pages we send *only* these crawlers to the
# backend's server-rendered Open Graph route; real browsers fall through to the SPA.
map $http_user_agent $product_upstream {
    default                  http://frontend:80;
    "~*facebookexternalhit"  http://backend:3000;
    "~*facebookcatalog"      http://backend:3000;
    "~*Facebot"              http://backend:3000;
    "~*Twitterbot"           http://backend:3000;
    "~*LinkedInBot"          http://backend:3000;
    "~*WhatsApp"             http://backend:3000;
    "~*Slackbot"             http://backend:3000;
    "~*TelegramBot"          http://backend:3000;
    "~*Discordbot"           http://backend:3000;
    "~*Pinterest"            http://backend:3000;
}

server {
    listen 80;
    server_name kistmebel.mk www.kistmebel.mk;

    # Let's Encrypt HTTP-01 challenge - must stay on plain HTTP so renewals work.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: force HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name kistmebel.mk www.kistmebel.mk;

    ssl_certificate /etc/letsencrypt/live/kistmebel.mk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kistmebel.mk/privkey.pem;

    # Mozilla intermediate profile: modern enough but compatible with reasonable browsers.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Tell the browser to stick to HTTPS for a year for this host only.
    # No includeSubDomains - the cPanel mail subdomains (webmail.*, etc.) live on
    # another host over HTTP and must not be force-upgraded.
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 50M;

    # Re-resolve upstream container names via Docker's embedded DNS instead of
    # caching at startup - otherwise rebuilding a service gives it a new IP that
    # this proxy keeps missing until it's restarted.
    resolver 127.0.0.11 valid=10s;

    # Backend API. We rewrite /api/* -> /* manually because proxy_pass with a
    # variable doesn't auto-strip the location prefix. Backend routes stay as
    # /auth/login, /products, etc. Uploads also flow through /api/uploads/*.
    location /api/ {
        set $backend_upstream http://backend:3000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Product pages: crawlers go to the backend OG route (which lives at the same
    # /product/:id path on the backend), everyone else to the SPA. The map above
    # picks the upstream from the User-Agent; the path is passed through unchanged.
    location ~ ^/product/\d+$ {
        proxy_pass $product_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else - frontend's nginx container serves the SPA.
    location / {
        set $frontend_upstream http://frontend:80;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
# Wedding app (separate compose project, reached over the shared "web" network
# as wedding-web:3000). It's a Next.js server that handles all its own routes
# (pages, /api, /uploads), so we forward everything to it unchanged.
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name sanislavko-wedding.mk www.sanislavko-wedding.mk;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name sanislavko-wedding.mk www.sanislavko-wedding.mk;

    ssl_certificate /etc/letsencrypt/live/sanislavko-wedding.mk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sanislavko-wedding.mk/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # Guest photo uploads (multiple files, several MB each).
    client_max_body_size 50M;

    resolver 127.0.0.11 valid=10s;

    location / {
        set $wedding_upstream http://wedding-web:3000;
        proxy_pass $wedding_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
