# Single-origin reverse proxy with TLS.
# Browser hits this on 443 (HTTPS). Frontend and backend live on the docker network
# behind it. /api/* gets stripped and forwarded to backend, everything else to frontend.
# Port 80 stays open only for HTTP->HTTPS redirect and Let's Encrypt ACME challenges.

server {
    listen 80;
    server_name km.kistmebel.mk;

    # Let's Encrypt HTTP-01 challenge - must stay on plain HTTP so renewals work.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: force HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name km.kistmebel.mk;

    ssl_certificate /etc/letsencrypt/live/km.kistmebel.mk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/km.kistmebel.mk/privkey.pem;

    # Mozilla intermediate profile: modern enough but compatible with reasonable browsers.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Tell the browser to stick to HTTPS for a year and apply to subdomains too.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 50M;

    # Re-resolve upstream container names via Docker's embedded DNS instead of
    # caching at startup - otherwise rebuilding a service gives it a new IP that
    # this proxy keeps missing until it's restarted.
    resolver 127.0.0.11 valid=10s;

    # Backend API. Trailing slash in proxy_pass strips the /api/ prefix so backend
    # routes stay as /auth/login, /products, etc. Uploads also flow through /api/uploads/*.
    location /api/ {
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else - frontend's nginx container serves the SPA.
    location / {
        set $frontend_upstream http://frontend:80;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
