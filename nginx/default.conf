# Single-origin reverse proxy.
# Browser hits this on port 80 only - frontend and backend live on the docker network
# behind it. /api/* gets stripped and forwarded to backend, everything else to frontend.

server {
    listen 80;
    server_name _;

    # Allow large product image uploads (multer is configured for image-sized files).
    client_max_body_size 50M;

    # Backend API. The trailing slash in proxy_pass strips the matched /api/ prefix,
    # so the browser sees /api/auth/login but backend gets /auth/login.
    # Backend static uploads also flow through here: /api/uploads/foo.jpg -> /uploads/foo.jpg.
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else is served by the frontend's nginx container (SPA + static assets).
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
