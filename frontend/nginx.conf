server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Built static assets are content-hashed by Vite, cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback - all unknown routes return index.html so React Router can handle them.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
